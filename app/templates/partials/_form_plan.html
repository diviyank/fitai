<form hx-post="/plan/generate" hx-target="#panel-plan" hx-swap="outerHTML" class="space-y-2">
  <label class="block text-sm">Durée (semaines)
    <input name="n_weeks" type="number" value="{{ params.get('n_weeks', 4) }}"
           class="w-full rounded-2xl border border-slate-200 px-3 py-2 mt-1"></label>
  <button {% if running %}disabled{% endif %}
          class="w-full rounded-2xl bg-brand-500 text-white font-semibold py-2">Générer le programme</button>
</form>

<form hx-post="/plan/parse" hx-target="#panel-plan" hx-swap="outerHTML" class="space-y-2 border-t pt-4 mt-4">
  <label class="block text-sm font-medium">Coller la réponse de l'IA
    <textarea name="raw" rows="6" class="w-full rounded-2xl border border-slate-200 px-3 py-2 text-sm mt-1"
              placeholder="Collez ici le bloc ```json renvoyé par l'IA"></textarea></label>
  <input type="hidden" name="n_weeks" value="{{ params.get('n_weeks', 4) }}">
  <button class="w-full rounded-2xl bg-slate-700 text-white font-semibold py-2">Analyser la réponse</button>
</form>
