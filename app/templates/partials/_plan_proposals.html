{% if notice %}<p class="text-sm text-amber-600 mb-2">{{ notice }}</p>{% endif %}
<div class="space-y-3">
  {% for p in plans %}
  <div class="bg-white rounded-2xl border border-slate-200 p-4">
    <p class="font-semibold mb-1">{{ p.label }}</p>
    <ul class="text-xs text-slate-500 mb-3 space-y-0.5">
      {% for s in p.sessions %}<li>S{{ s.week }}·J{{ s.day }} — {{ s.title }} ({{ s.exercises|length }} ex.)</li>{% endfor %}
    </ul>
    <form action="/plan/{{ plan.id }}/activate" method="post">
      <input type="hidden" name="choice" value="{{ loop.index0 }}">
      <button class="w-full rounded-2xl bg-brand-500 text-white font-semibold py-2">Choisir ce programme</button>
    </form>
  </div>
  {% endfor %}
</div>
<form action="/plan/{{ plan.id }}/regenerate" method="post" hx-post="/plan/{{ plan.id }}/regenerate"
      hx-target="#plan-out" hx-swap="innerHTML" hx-indicator="#plan-spinner" hx-disabled-elt="find button" class="mt-3">
  <button class="w-full rounded-2xl border border-brand-500 text-brand-600 font-semibold py-2">Autres programmes</button>
</form>
