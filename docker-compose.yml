services:
  fitai:
    image: ghcr.io/OWNER/fitai:latest   # replace OWNER with your GitHub owner/org
    container_name: fitai
    ports:
      - "1313:1313"
    environment:
      # Passed through from the shell running `docker compose` OR from a sibling .env
      # file (compose auto-loads it). Empty => app falls back to copy-paste prompts.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      FITAI_LLM_MODEL: "claude-sonnet-4-6"
    volumes:
      - fitai-data:/data
    restart: unless-stopped

volumes:
  fitai-data:
